# Trigger deployment check
name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check Secrets Presence
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then echo "❌ VPS_HOST is MISSING"; else echo "✅ VPS_HOST is set"; fi
          if [ -z "${{ secrets.VPS_USER }}" ]; then echo "❌ VPS_USER is MISSING"; else echo "✅ VPS_USER is set"; fi
          if [ -z "${{ secrets.VPS_PASSWORD }}" ]; then echo "❌ VPS_PASSWORD is MISSING"; else echo "✅ VPS_PASSWORD is set"; fi

      - name: Deploy using ssh
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            echo "Searching for project directory..."
            # Try a few common locations
            if [ -d "/root/repo/chicman" ]; then
              PROJECT_DIR="/root/repo/chicman"
            elif [ -d "/root/chicman" ]; then
              PROJECT_DIR="/root/chicman"
            elif [ -d "/root/costume" ]; then
              PROJECT_DIR="/root/costume"
            elif [ -d "/var/www/chicman" ]; then
              PROJECT_DIR="/var/www/chicman"
            else
              echo "❌ ERROR: Project directory not found in common locations."
              echo "Available folders in /root:"
              ls -F /root
              exit 1
            fi
            
            echo "✅ Project found in: $PROJECT_DIR"
            cd "$PROJECT_DIR"
            
            echo "Fetching latest code..."
            git fetch origin
            git reset --hard origin/main
            
            echo "Updating Backend..."
            cd costume/backend
            npm install
            npx prisma generate
            npx prisma migrate deploy
            
            echo "Updating Frontend..."
            cd ../frontend
            npm install
            npm run build
            cp -R dist/* /var/www/chic/
            
            echo "Restarting services..."
            pm2 restart all
            systemctl restart nginx
            echo "Deployment successful!"
