# Trigger deployment check
name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check Secrets Presence
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then echo "❌ VPS_HOST is MISSING"; else echo "✅ VPS_HOST is set"; fi
          if [ -z "${{ secrets.VPS_USER }}" ]; then echo "❌ VPS_USER is MISSING"; else echo "✅ VPS_USER is set"; fi
          if [ -z "${{ secrets.VPS_PASSWORD }}" ]; then echo "❌ VPS_PASSWORD is MISSING"; else echo "✅ VPS_PASSWORD is set"; fi

      - name: Deploy using ssh
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            echo "Searching for project directory in more locations..."
            
            # Try to find the directory named 'costume' starting from / (limited depth for speed)
            FOUND_PATH=$(find / -maxdepth 4 -name "costume" -type d 2>/dev/null | grep -v "snap" | head -n 1)
            
            if [ -z "$FOUND_PATH" ]; then
              # Try finding chicman instead
              FOUND_PATH=$(find / -maxdepth 4 -name "chicman" -type d 2>/dev/null | grep -v "snap" | head -n 1)
            fi
            
            if [ -n "$FOUND_PATH" ]; then
              PROJECT_DIR="$FOUND_PATH"
              # If the path points to 'costume' but not the root of the repo, we might need the parent
              if [[ "$PROJECT_DIR" == *"/costume" ]]; then
                # Check if it's the root or a subfolder
                if [ -d "$PROJECT_DIR/backend" ]; then
                   # This looks like the right place, or maybe one level up?
                   echo "Detected costume folder at $PROJECT_DIR"
                fi
              fi
            else
              echo "❌ ERROR: Project directory not found."
              echo "Contents of /home:"
              ls -F /home
              echo "Contents of /var/www:"
              ls -F /var/www
              exit 1
            fi
            
            echo "✅ Project found in: $PROJECT_DIR"
            cd "$PROJECT_DIR"
            
            # If we are in 'costume' folder but it's part of a 'chicman' repo
            if [ -d "../.git" ]; then
               cd ..
               echo "Moved up to repository root: $(pwd)"
            fi
            
            echo "Fetching latest code..."
            git fetch origin
            git reset --hard origin/main
            
            echo "Updating Backend..."
            cd costume/backend
            npm install
            npx prisma generate
            npx prisma migrate deploy
            
            echo "Updating Frontend..."
            cd ../frontend
            npm install
            npm run build
            cp -R dist/* /var/www/chic/
            
            echo "Restarting services..."
            pm2 restart all
            systemctl restart nginx
            echo "Deployment successful!"
