# Trigger deployment check
name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check Secrets Presence
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then echo "❌ VPS_HOST is MISSING"; else echo "✅ VPS_HOST is set"; fi
          if [ -z "${{ secrets.VPS_USER }}" ]; then echo "❌ VPS_USER is MISSING"; else echo "✅ VPS_USER is set"; fi
          if [ -z "${{ secrets.VPS_PASSWORD }}" ]; then echo "❌ VPS_PASSWORD is MISSING"; else echo "✅ VPS_PASSWORD is set"; fi

      - name: Deploy using ssh
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            echo "Searching for project directory using pm2..."
            
            # Detect path from PM2 if possible
            PM2_PATH=$(pm2 show all 2>/dev/null | grep "interpreting directory" | awk '{print $NF}' | head -n 1)
            
            if [ -z "$PM2_PATH" ]; then
                # Fallback to search for package.json in costume folder
                echo "PM2 detection failed, searching filesystem..."
                PM2_PATH=$(find / -name "package.json" -path "*/costume/backend/*" 2>/dev/null | head -n 1 | sed 's|/costume/backend/package.json||')
            fi
            
            if [ -n "$PM2_PATH" ] && [ -d "$PM2_PATH" ]; then
              PROJECT_DIR="$PM2_PATH"
              echo "✅ Project detected via PM2/Filesystem at: $PROJECT_DIR"
            else
              echo "❌ ERROR: Could not locate project directory."
              echo "Diagnostic Info:"
              pm2 list
              find /var/www -maxdepth 2
              exit 1
            fi
            
            cd "$PROJECT_DIR"
            
            echo "Fetching latest code..."
            git fetch origin
            git reset --hard origin/main
            
            echo "Updating Backend..."
            cd costume/backend
            npm install
            npx prisma generate
            npx prisma migrate deploy
            
            echo "Updating Frontend..."
            cd ../frontend
            npm install
            npm run build
            cp -R dist/* /var/www/chic/
            
            echo "Restarting services..."
            pm2 restart all
            systemctl restart nginx
            echo "Deployment successful!"
