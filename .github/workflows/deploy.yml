# Trigger deployment check
name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check Secrets Presence
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then echo "❌ VPS_HOST is MISSING"; else echo "✅ VPS_HOST is set"; fi
          if [ -z "${{ secrets.VPS_USER }}" ]; then echo "❌ VPS_USER is MISSING"; else echo "✅ VPS_USER is set"; fi
          if [ -z "${{ secrets.VPS_PASSWORD }}" ]; then echo "❌ VPS_PASSWORD is MISSING"; else echo "✅ VPS_PASSWORD is set"; fi

      - name: Deploy using ssh
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            echo "Directly targeting project directory: /var/www/costume"
            
            PROJECT_DIR="/var/www/costume"
            
            if [ ! -d "$PROJECT_DIR" ]; then
                echo "❌ ERROR: /var/www/costume not found. Searching fallback..."
                PROJECT_DIR=$(find /var/www -name "package.json" -path "*/costume/backend/*" 2>/dev/null | head -n 1 | sed 's|/costume/backend/package.json||')
            fi
            
            if [ -z "$PROJECT_DIR" ] || [ ! -d "$PROJECT_DIR" ]; then
                echo "❌ ERROR: Could not locate project directory."
                exit 1
            fi
            
            echo "✅ Using project directory: $PROJECT_DIR"
            cd "$PROJECT_DIR"
            
            echo "Fetching latest code from GitHub..."
            # Ensure we are in a git repo
            if [ ! -d ".git" ]; then
                echo "❌ ERROR: Not a git repository at $PROJECT_DIR"
                exit 1
            fi
            
            git fetch origin
            git reset --hard origin/main
            
            # The structure is usually /var/www/costume/costume/backend
            # Based on the user's local path 'costume/costume/backend'
            
            echo "Updating Backend..."
            cd costume/backend || { echo "❌ Backend folder not found"; exit 1; }
            npm install
            npx prisma generate
            npx prisma migrate deploy
            node scripts/fix-balances.js
            
            echo "Updating Frontend..."
            cd ../frontend || { echo "❌ Frontend folder not found"; exit 1; }
            npm install
            npm run build
            
            # Verify dist folder
            if [ -d "dist" ]; then
                echo "Copying build to /var/www/chic/"
                cp -R dist/* /var/www/chic/
            else
                echo "❌ ERROR: Build failed, dist folder not found."
                exit 1
            fi
            
            echo "Restarting services..."
            # Try to restart pm2 with specific name if possible
            pm2 restart all
            systemctl restart nginx
            
            echo "✅ Deployment successful!"
