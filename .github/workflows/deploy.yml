name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy using ssh
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            echo "SSH connection successful."
            echo "Current User: $(whoami)"
            echo "Current Directory: $(pwd)"
            echo "Checking /root/repo/chicman..."
            if [ -d "/root/repo/chicman" ]; then
              echo "SUCCESS: Found /root/repo/chicman"
              ls -la /root/repo/chicman | head -n 5
            else
              echo "ERROR: Directory /root/repo/chicman NOT found."
              echo "Listing /root/repo/:"
              ls -la /root/repo/ || echo "Cannot list /root/repo/"
              exit 1
            fi
